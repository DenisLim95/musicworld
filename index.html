<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Hallway</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block}
#fade{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:20;transition:opacity .75s ease}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between;padding:28px;align-items:center}
#room{font-family:Georgia,'Times New Roman',serif;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.28);transition:opacity 1.4s ease}
#hint{font-family:Georgia,'Times New Roman',serif;font-size:20px;letter-spacing:.18em;color:rgba(255,255,255,.55)}
</style>
</head>
<body>
<div id="fade"></div>
<div id="ui">
  <div id="room">The Hallway</div>
  <div id="hint">WASD move &nbsp;·&nbsp; mouse look &nbsp;·&nbsp; click to enable</div>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.min.js';
const { Scene, WebGLRenderer, PerspectiveCamera, Vector3,
  BoxGeometry, SphereGeometry, CylinderGeometry, PlaneGeometry, ConeGeometry,
  CircleGeometry, BufferGeometry, BufferAttribute,
  MeshLambertMaterial, MeshBasicMaterial, MeshStandardMaterial,
  PointsMaterial, Points, Mesh, Group,
  AmbientLight, DirectionalLight, PointLight,
  Color, Fog, FogExp2,
  PCFSoftShadowMap, ACESFilmicToneMapping } = THREE;

// ─── Renderer ───────────────────────────────────────────────────────
const renderer = new WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = PCFSoftShadowMap;
renderer.toneMapping = ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

// ─── Camera ─────────────────────────────────────────────────────────
const camera = new PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 60);
const camTgt = new Vector3();
camera.position.set(0, 1.62, 2);
camera.lookAt(0, 1.62, -1);

// ─── Input ──────────────────────────────────────────────────────────
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── State ──────────────────────────────────────────────────────────
let scene = 'hub';
let busy  = false;
let clock = 0;
const char = { x: 0, z: 2, ry: Math.PI, rx: 0 }; // rx = pitch (up/down)

// ─── Mouse Look ─────────────────────────────────────────────────────
renderer.domElement.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement === renderer.domElement) {
    char.ry -= e.movementX * 0.002;
    char.rx -= e.movementY * 0.002;
    // Clamp pitch to avoid flipping
    char.rx = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, char.rx));
  }
});

// ─── Audio ──────────────────────────────────────────────────────────
const bedroomAudio = new Audio('audio/bedroom.mp3');
bedroomAudio.loop = true;
bedroomAudio.volume = 0.5;

// Audio analyser for bass detection
let audioCtx, analyser, dataArray, audioSource, audioInitialized = false;
let smoothBass = 0; // Smoothed bass value for less jittery effects
const BPM = 88; // Set this to match your song's BPM
const DRUM_START_TIME = 11; // Seconds into the song when drums kick in (set this to match your track)

function initAudioAnalyser() {
  if (audioInitialized) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  audioSource = audioCtx.createMediaElementSource(bedroomAudio);
  audioSource.connect(analyser);
  analyser.connect(audioCtx.destination);
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  audioInitialized = true;
  // Resume audio context (browsers suspend until user interaction)
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function getBassLevel() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  // Average the low frequencies (first 8 bins ≈ 0-350Hz)
  let sum = 0;
  for (let i = 0; i < 8; i++) sum += dataArray[i];
  const level = sum / (8 * 255); // Normalize to 0-1
  // Smooth the bass - fast attack, slower release
  smoothBass = level > smoothBass ? level : smoothBass * 0.92 + level * 0.08;
  return smoothBass;
}

// ─── Helpers ────────────────────────────────────────────────────────
const mat  = c => new MeshLambertMaterial({ color: c });
const flat = c => new MeshBasicMaterial({ color: c });

function box(w, h, d, color) {
  const m = new Mesh(new BoxGeometry(w, h, d), mat(color));
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function place(obj, x, y, z) { obj.position.set(x, y, z); return obj; }
function addTo(sc, obj) { sc.add(obj); return obj; }

// ─── Character ──────────────────────────────────────────────────────
function makeCharacter() {
  const g = new Group();
  // Body cylinder
  const body = new Mesh(
    new CylinderGeometry(0.26, 0.26, 0.9, 10),
    mat(0x4e6880)
  );
  body.position.y = 0.82; body.castShadow = true; g.add(body);
  // Body top cap
  const capT = new Mesh(new SphereGeometry(0.26, 10, 5, 0, Math.PI*2, 0, Math.PI/2), mat(0x4e6880));
  capT.rotation.x = Math.PI; capT.position.y = 1.27; g.add(capT);
  // Body bottom cap
  const capB = new Mesh(new SphereGeometry(0.26, 10, 5, 0, Math.PI*2, 0, Math.PI/2), mat(0x4e6880));
  capB.position.y = 0.37; g.add(capB);
  // Head
  const head = new Mesh(new SphereGeometry(0.21, 12, 10), mat(0xc8a07a));
  head.position.y = 1.58; head.castShadow = true; g.add(head);
  // Blob shadow
  const shadow = new Mesh(
    new CircleGeometry(0.28, 10),
    new MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22 })
  );
  shadow.rotation.x = -Math.PI / 2; shadow.position.y = 0.01; g.add(shadow);
  return g;
}

// ─── HUB SCENE ──────────────────────────────────────────────────────
function buildHub() {
  const sc = new Scene();
  sc.background = new Color(0xc0aa88);
  sc.fog = new Fog(0xc0aa88, 8, 22);

  const S = 5, H = 4.2, dW = 1.1, dH = 2.85, wc = 0xc8b898;

  // Floor with plank lines
  addTo(sc, place(box(S*2, 0.12, S*2, 0x7a6e58), 0, -0.06, 0));
  for (let i = -4; i <= 4; i += 2)
    addTo(sc, place(box(0.07, 0.01, S*2, 0x6a5e4a), i, 0.01, 0));

  // No ceiling — camera is above the room, ceiling would block the view

  // Walls
  addTo(sc, place(box(S*2, H, 0.18, wc), 0, H/2, S));   // south
  addTo(sc, place(box(0.18, H, S*2, wc), S, H/2, 0));   // east
  addTo(sc, place(box(0.18, H, S*2, wc), -S, H/2, 0));  // west

  // North wall with door gap
  addTo(sc, place(box(S-dW, H, 0.18, wc), -(S+dW)/2, H/2, -S));
  addTo(sc, place(box(S-dW, H, 0.18, wc),  (S+dW)/2, H/2, -S));
  addTo(sc, place(box(dW*2, H-dH, 0.18, wc), 0, dH+(H-dH)/2, -S));

  // Door frame
  const fc = 0x3a2412;
  addTo(sc, place(box(0.11, dH+0.08, 0.11, fc), -dW-0.05, dH/2, -S+0.1));
  addTo(sc, place(box(0.11, dH+0.08, 0.11, fc),  dW+0.05, dH/2, -S+0.1));
  addTo(sc, place(box(dW*2+0.22, 0.12, 0.13, fc), 0, dH+0.06, -S+0.1));

  // Door glow portal
  const portal = new Mesh(
    new PlaneGeometry(dW*2, dH),
    new MeshBasicMaterial({ color: 0xffcc6a, transparent: true, opacity: 0.13, side: THREE.DoubleSide })
  );
  portal.position.set(0, dH/2, -S+0.07);
  sc.add(portal);

  // Stone/tile details on walls
  const sc2 = 0x2e2824;
  for (let row = 0; row < 3; row++) {
    for (let col = -2; col <= 2; col++) {
      const tile = box(1.5, 1.1, 0.02, row%2===0 ? sc2 : 0x221e1a);
      tile.position.set(col*2, 0.7 + row*1.25, S-0.09);
      sc.add(tile);
    }
  }

  // Torches on south wall
  [-3, 3].forEach(x => {
    addTo(sc, place(box(0.12, 0.5, 0.12, 0x5a3520), x, 2.1, S-0.15));
    const flame = new Mesh(new SphereGeometry(0.11, 7, 5), flat(0xff9020));
    flame.position.set(x, 2.52, S-0.15);
    sc.add(flame);
    // Torch bracket
    addTo(sc, place(box(0.26, 0.06, 0.16, 0x2a1a10), x, 2.0, S-0.17));
  });

  // Subtle door glow on floor
  const floorGlow = new Mesh(
    new PlaneGeometry(2.2, 1.5),
    new MeshBasicMaterial({ color: 0xffa030, transparent: true, opacity: 0.06, depthWrite: false })
  );
  floorGlow.rotation.x = -Math.PI/2;
  floorGlow.position.set(0, 0.01, -S+1.2);
  sc.add(floorGlow);

  // Lighting — bright warm stone corridor
  sc.add(new AmbientLight(0xfff0d8, 2.8));

  const sunDir = new DirectionalLight(0xffe8c0, 2.0);
  sunDir.position.set(3, 12, 6); sc.add(sunDir);

  const doorGlow = new PointLight(0xffcc60, 4.0, 8, 1);
  doorGlow.position.set(0, 1.7, -S+1.2);
  doorGlow.userData.base = 4.0;
  sc.add(doorGlow);

  const t1 = new PointLight(0xffaa40, 2.8, 7, 1);
  t1.position.set(-3, 2.5, S-0.15); t1.userData.base = 2.8; sc.add(t1);
  const t2 = new PointLight(0xffaa40, 2.8, 7, 1);
  t2.position.set(3, 2.5, S-0.15); t2.userData.base = 2.8; sc.add(t2);

  return sc;
}

// ─── BEDROOM SCENE ──────────────────────────────────────────────────
function buildBedroom() {
  const sc = new Scene();
  sc.background = new Color(0xc08840);
  sc.fog = new FogExp2(0xd0a050, 0.032);
  sc.userData.baseFogDensity = 0.032;

  const W = 5, D = 4, H = 3.5, dW = 1.0, dH = 2.6;
  const flC = 0x7a4e2a, wlC = 0xeacca0, clC = 0xf5e8d0;

  // Floor
  addTo(sc, place(box(W*2, 0.12, D*2, flC), 0, -0.06, 0));
  for (let i = -4; i <= 4; i++)
    addTo(sc, place(box(0.06, 0.01, D*2, 0x5a3820), i, 0.01, 0));

  // Ceiling
  addTo(sc, place(box(W*2, 0.12, D*2, clC), 0, H + 0.06, 0));

  // Crown molding on top of walls
  const mc = 0xd8b888;
  addTo(sc, place(box(W*2, 0.08, 0.07, mc), 0, H-0.04, D));
  addTo(sc, place(box(W*2, 0.08, 0.07, mc), 0, H-0.04, -D));
  addTo(sc, place(box(0.07, 0.08, D*2, mc), W, H-0.04, 0));
  addTo(sc, place(box(0.07, 0.08, D*2, mc), -W, H-0.04, 0));

  // Baseboards
  const bc = 0xd0b07a;
  addTo(sc, place(box(W*2, 0.1, 0.06, bc), 0, 0.05, D));
  addTo(sc, place(box(W*2, 0.1, 0.06, bc), 0, 0.05, -D));
  addTo(sc, place(box(0.06, 0.1, D*2, bc), W, 0.05, 0));
  addTo(sc, place(box(0.06, 0.1, D*2, bc), -W, 0.05, 0));

  // ── Walls ─────────────────────────────────────────────────────
  const wallNorth = addTo(sc, place(box(W*2, H, 0.12, wlC), 0, H/2, -D));
  const wallWest = addTo(sc, place(box(0.12, H, D*2, wlC), -W, H/2, 0));
  sc.userData.walls = [wallNorth, wallWest];

  // East wall with window
  const wY=1.15, wH=1.85, wZ=2.4; // window bottom y, height, z-span
  addTo(sc, place(box(0.12, wY, D*2, wlC), W, wY/2, 0));                          // below
  addTo(sc, place(box(0.12, H-wY-wH, D*2, wlC), W, wY+wH+(H-wY-wH)/2, 0));        // above
  const flank = (D*2 - wZ) / 2;
  addTo(sc, place(box(0.12, wH, flank, wlC), W, wY+wH/2, -(wZ/2+flank/2)));
  addTo(sc, place(box(0.12, wH, flank, wlC), W, wY+wH/2,  (wZ/2+flank/2)));

  // ── Outdoor park scene (visible through window) ──────────────
  const outdoorGroup = new Group();
  outdoorGroup.position.set(W + 2, 0, 0);

  // Sky gradient backdrop (large enough to fill entire view)
  const sky = new Mesh(
    new PlaneGeometry(60, 40),
    new MeshBasicMaterial({ color: 0x6eb4e8, side: THREE.DoubleSide })
  );
  sky.rotation.y = Math.PI/2;
  sky.position.set(14, 8, 0);
  outdoorGroup.add(sky);

  // Distant mountains/hills (far background)
  const hillColors = [0x7a9bb8, 0x8aa8c2, 0x6a8ca8];
  [[10, 2.5, -4, 6], [11, 3.2, 2, 8], [10.5, 2.8, -1, 5], [11.5, 2.2, 5, 4]].forEach(([hx, hh, hz, hw], i) => {
    const hill = new Mesh(
      new ConeGeometry(hw, hh, 6),
      new MeshBasicMaterial({ color: hillColors[i % hillColors.length] })
    );
    hill.position.set(hx, hh * 0.3, hz);
    hill.scale.x = 1.8;
    outdoorGroup.add(hill);
  });

  // Mid-distance tree line (forest edge)
  const farTreeColor = 0x3a6a40;
  for (let i = -6; i <= 6; i += 1.2) {
    const treeBlob = new Mesh(
      new SphereGeometry(0.8 + Math.random() * 0.4, 6, 5),
      new MeshBasicMaterial({ color: farTreeColor })
    );
    treeBlob.position.set(7 + Math.random() * 0.5, 1.5 + Math.random() * 0.3, i);
    treeBlob.scale.y = 1.2 + Math.random() * 0.3;
    outdoorGroup.add(treeBlob);
  }

  // Sun
  const sunDisc = new Mesh(
    new CircleGeometry(1.2, 16),
    new MeshBasicMaterial({ color: 0xfffde8 })
  );
  sunDisc.rotation.y = Math.PI/2;
  sunDisc.position.set(10, 6, 3);
  outdoorGroup.add(sunDisc);

  // Sun glow
  const sunGlow = new Mesh(
    new CircleGeometry(2.2, 16),
    new MeshBasicMaterial({ color: 0xfff4c0, transparent: true, opacity: 0.35 })
  );
  sunGlow.rotation.y = Math.PI/2;
  sunGlow.position.set(10.1, 6, 3);
  outdoorGroup.add(sunGlow);

  // Clouds
  [[9, 5.5, -2], [8, 6.2, 4], [11, 5.8, 1], [7, 5.3, -4]].forEach(([cx, cy, cz]) => {
    const cloud = new Mesh(
      new SphereGeometry(0.6, 6, 5),
      new MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
    );
    cloud.scale.set(2, 0.6, 1);
    cloud.position.set(cx, cy, cz);
    outdoorGroup.add(cloud);
  });

  // Ground - solid green box positioned outside the window
  const ground = new Mesh(
    new BoxGeometry(30, 6, 40),
    new MeshBasicMaterial({ color: 0x5a9c47 })
  );
  ground.position.set(15, -2.5, 0);
  outdoorGroup.add(ground);

  // Small grassy hill bump
  const hillBump = new Mesh(
    new SphereGeometry(2, 8, 6),
    new MeshBasicMaterial({ color: 0x4a8c3a })
  );
  hillBump.scale.set(2, 0.4, 1.5);
  hillBump.position.set(4, -0.2, -2);
  outdoorGroup.add(hillBump);

  // Closer trees (foreground) - raised so trunks are visible
  const treeColors = [0x2d5a27, 0x3d6a37, 0x4a7a44, 0x2a5020, 0xc76a32, 0xd4823a];
  const treeBaseY = 0.5; // Ground level
  const treeTops = []; // Store foliage for animation
  [[0.5, 2.0, -2.5], [1.5, 2.5, 3], [3, 1.8, -1], [2.5, 2.2, 1.8], [1, 1.6, 0.5], [4, 2.8, -3], [3.5, 2.0, 4]].forEach(([tx, th, tz], i) => {
    // Trunk
    const trunk = new Mesh(new CylinderGeometry(0.08, 0.12, th * 0.5, 6), mat(0x5a3a20));
    trunk.position.set(tx, treeBaseY + th * 0.25, tz);
    outdoorGroup.add(trunk);
    // Foliage (in a group for animation)
    const treeTop = new Group();
    const foliage = new Mesh(new SphereGeometry(th * 0.4, 8, 6), mat(treeColors[i % treeColors.length]));
    foliage.scale.set(1, 1.4, 1);
    treeTop.add(foliage);
    treeTop.position.set(tx, treeBaseY + th * 0.7, tz);
    outdoorGroup.add(treeTop);
    treeTops.push(treeTop);
  });
  sc.userData.treeTops = treeTops;

  // Autumn falling leaves
  const leafCount = 60;
  const leafPos = new Float32Array(leafCount * 3);
  const leafVel = new Float32Array(leafCount * 3);
  for (let i = 0; i < leafCount; i++) {
    leafPos[i*3]   = (Math.random() - 0.5) * 8;
    leafPos[i*3+1] = Math.random() * 5 + 1;
    leafPos[i*3+2] = (Math.random() - 0.5) * 5;
    leafVel[i*3]   = (Math.random() - 0.5) * 0.008;
    leafVel[i*3+1] = -0.008 - Math.random() * 0.006;
    leafVel[i*3+2] = (Math.random() - 0.5) * 0.005;
  }
  const leafGeo = new BufferGeometry();
  leafGeo.setAttribute('position', new BufferAttribute(leafPos, 3));
  const leaves = new Points(leafGeo, new PointsMaterial({
    color: 0xd4652a, size: 0.08, transparent: true, opacity: 0.9, sizeAttenuation: true
  }));
  outdoorGroup.add(leaves);
  sc.userData.leaves = { pts: leaves, vel: leafVel };

  sc.add(outdoorGroup);

  // Window glass (slight tint, see-through)
  const winPane = new Mesh(
    new PlaneGeometry(wZ, wH),
    new MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
  );
  winPane.rotation.y = Math.PI/2;
  winPane.position.set(W-0.04, wY+wH/2, 0);
  sc.add(winPane);
  // Window dividers
  addTo(sc, place(box(0.07, wH, 0.07, 0x8a6040), W-0.06, wY+wH/2, 0));         // vertical
  addTo(sc, place(box(0.07, 0.07, wZ, 0x8a6040), W-0.06, wY+wH/2, 0));         // horizontal

  // South wall with door
  addTo(sc, place(box(W-dW, H, 0.12, wlC), -(W+dW)/2, H/2, D));
  addTo(sc, place(box(W-dW, H, 0.12, wlC),  (W+dW)/2, H/2, D));
  addTo(sc, place(box(dW*2, H-dH, 0.12, wlC), 0, dH+(H-dH)/2, D));
  // Door frame
  const dfc = 0x6a4828;
  addTo(sc, place(box(0.1, dH, 0.1, dfc), -dW-0.04, dH/2, D-0.08));
  addTo(sc, place(box(0.1, dH, 0.1, dfc),  dW+0.04, dH/2, D-0.08));
  addTo(sc, place(box(dW*2+0.2, 0.1, 0.1, dfc), 0, dH, D-0.08));
  // Closed door (brown wooden door)
  addTo(sc, place(box(dW*2, dH, 0.06, 0x5a3a1a), 0, dH/2, D-0.03));
  // Door panels (decorative)
  addTo(sc, place(box(0.7, 0.9, 0.02, 0x4a2a10), -0.4, dH*0.7, D-0.06));
  addTo(sc, place(box(0.7, 0.9, 0.02, 0x4a2a10), 0.4, dH*0.7, D-0.06));
  addTo(sc, place(box(0.7, 0.9, 0.02, 0x4a2a10), -0.4, dH*0.3, D-0.06));
  addTo(sc, place(box(0.7, 0.9, 0.02, 0x4a2a10), 0.4, dH*0.3, D-0.06));
  // Door knob
  addTo(sc, place(box(0.06, 0.06, 0.04, 0xc0a060), 0.75, dH*0.45, D-0.08));

  // ── Furniture ─────────────────────────────────────────────────

  // Bed (northwest)
  const bx=-2.5, bz=-2.4;
  addTo(sc, place(box(2.4, 0.28, 3.8, 0x3c2010), bx, 0.14, bz));           // frame
  addTo(sc, place(box(2.4, 1.15, 0.14, 0x3c2010), bx, 0.88, bz-1.9));      // headboard
  addTo(sc, place(box(2.1, 0.22, 3.5, 0xf0ece0), bx, 0.41, bz));           // mattress
  addTo(sc, place(box(2.05, 0.2, 2.4, 0xd4956a), bx, 0.55, bz+0.55));      // duvet
  addTo(sc, place(box(1.7, 0.14, 0.52, 0xf5f0e8), bx, 0.59, bz-1.3));      // pillow L
  addTo(sc, place(box(0.1, 0.32, 0.1, 0x3c2010), bx-1.1, 0.14, bz+1.9));   // foot post L
  addTo(sc, place(box(0.1, 0.32, 0.1, 0x3c2010), bx+1.1, 0.14, bz+1.9));   // foot post R
  // Rumpled blanket fold
  addTo(sc, place(box(2.0, 0.1, 0.5, 0xc07850), bx, 0.67, bz+1.6));

  // Bulldog on bed (sitting pose)
  const dogX = bx + 0.5, dogY = 0.65, dogZ = bz + 0.3;
  const dogColor = 0xe8d4b8, dogDark = 0x8b7355;
  // Body (stocky, tilted back for sitting)
  const dogBody = box(0.35, 0.26, 0.4, dogColor);
  dogBody.rotation.x = -0.25; // Tilt back slightly
  addTo(sc, place(dogBody, dogX, dogY + 0.13, dogZ));
  // Back haunches (visible on sides when sitting)
  addTo(sc, place(box(0.12, 0.14, 0.18, dogColor), dogX - 0.16, dogY + 0.05, dogZ - 0.08));
  addTo(sc, place(box(0.12, 0.14, 0.18, dogColor), dogX + 0.16, dogY + 0.05, dogZ - 0.08));
  // Front paws (stretched out in front)
  addTo(sc, place(box(0.08, 0.06, 0.14, dogColor), dogX - 0.1, dogY, dogZ + 0.22));
  addTo(sc, place(box(0.08, 0.06, 0.14, dogColor), dogX + 0.1, dogY, dogZ + 0.22));
  // Head (big boxy bulldog head) - in a group so we can rotate it
  const dogHead = new Group();
  const skull = box(0.28, 0.22, 0.24, dogColor);
  skull.position.set(0, 0, 0);
  dogHead.add(skull);
  // Snout
  const snout = box(0.14, 0.1, 0.1, dogDark);
  snout.position.set(0, -0.04, 0.14);
  dogHead.add(snout);
  // Nose
  const nose = box(0.06, 0.04, 0.03, 0x222222);
  nose.position.set(0, 0, 0.19);
  dogHead.add(nose);
  // Eyes (stored for blink animation)
  const eyeL = box(0.045, 0.045, 0.02, 0x222222);
  eyeL.position.set(-0.08, 0.04, 0.11);
  dogHead.add(eyeL);
  const eyeR = box(0.045, 0.045, 0.02, 0x222222);
  eyeR.position.set(0.08, 0.04, 0.11);
  dogHead.add(eyeR);
  sc.userData.dogEyes = [eyeL, eyeR];
  // Ears (floppy)
  const earL = box(0.07, 0.1, 0.04, dogDark);
  earL.position.set(-0.14, 0.02, -0.02);
  earL.rotation.z = 0.3;
  dogHead.add(earL);
  const earR = box(0.07, 0.1, 0.04, dogDark);
  earR.position.set(0.14, 0.02, -0.02);
  earR.rotation.z = -0.3;
  dogHead.add(earR);
  // Position head on body (sitting close to body)
  dogHead.position.set(dogX, dogY + 0.26, dogZ + 0.25);
  sc.add(dogHead);
  // Tail (stubby)
  addTo(sc, place(box(0.06, 0.06, 0.08, dogColor), dogX, dogY + 0.18, dogZ - 0.26));
  // Store reference for animation
  sc.userData.dogHead = dogHead;
  sc.userData.dogHeadBaseY = dogHead.position.y;
  sc.userData.dogHeadBaseZ = dogHead.position.z;

  // Nightstand
  const nx=bx+1.55, nz=bz-1.35;
  addTo(sc, place(box(0.62, 0.58, 0.62, 0x5a3820), nx, 0.29, nz));
  // Lamp
  addTo(sc, place(box(0.18, 0.04, 0.18, 0x888070), nx, 0.6, nz));
  addTo(sc, place(box(0.04, 0.38, 0.04, 0x888070), nx, 0.79, nz));
  const shade = new Mesh(new CylinderGeometry(0.08, 0.19, 0.24, 8), mat(0xeed8a0));
  shade.position.set(nx, 1.1, nz); sc.add(shade);
  const lampLight = new PointLight(0xffcc60, 2.5, 3.5, 1.5);
  lampLight.position.set(nx, 0.95, nz); sc.add(lampLight);
  // Book on nightstand
  addTo(sc, place(box(0.32, 0.04, 0.24, 0x8a5050), nx-0.05, 0.62, nz+0.1));

  // Rug
  addTo(sc, place(box(3.6, 0.015, 2.8, 0x9a4e3a), 0.5, 0.01, 0.5));
  addTo(sc, place(box(3.1, 0.016, 2.3, 0xb06050), 0.5, 0.012, 0.5));

  // Bookshelf (west wall)
  const sx=-W+0.22;
  addTo(sc, place(box(0.22, 2.1, 1.8, 0x4a2e14), sx, 1.05, -0.8));
  [0.35, 0.92, 1.5].forEach(sy =>
    addTo(sc, place(box(0.24, 0.05, 1.72, 0x5a3820), sx, sy, -0.8)));
  const bkC=[0x9a3030,0x305890,0x30704a,0xa06228,0x702880,0x804848,0x306070,0x8a8030];
  bkC.forEach((c,i)=>{
    addTo(sc, place(box(0.14,0.3+Math.random()*0.1,0.11,c), sx+0.02,0.52,-1.5+i*0.26));
    addTo(sc, place(box(0.14,0.27+Math.random()*0.09,0.11,c), sx+0.02,1.1,-1.5+i*0.26));
  });
  bkC.slice(0,5).forEach((c,i)=>
    addTo(sc, place(box(0.14,0.25+Math.random()*0.08,0.11,c), sx+0.02,1.68,-1.5+i*0.26)));

  // Desk (southeast)
  const dx=3.5, dz=1.6;
  addTo(sc, place(box(1.65, 0.07, 0.8, 0x5a3a20), dx, 0.73, dz));
  [[0.72,0.3],[-0.72,0.3],[0.72,-0.3],[-0.72,-0.3]].forEach(([ddx,ddz])=>
    addTo(sc, place(box(0.07,0.73,0.07,0x4a2e14), dx+ddx, 0.365, dz+ddz)));
  addTo(sc, place(box(0.22,0.3,0.1,0x8a4040), dx-0.42, 0.9, dz-0.28));
  addTo(sc, place(box(0.18,0.27,0.1,0x406050), dx-0.66, 0.895, dz-0.28));
  addTo(sc, place(box(0.38,0.03,0.28,0xf5f0e0), dx+0.22, 0.785, dz));

  // Wall art above desk
  addTo(sc, place(box(1.2, 0.85, 0.04, 0xc8a878), W-0.06, 2.2, dz));
  addTo(sc, place(box(1.04, 0.7, 0.045, 0x90b8d0), W-0.06, 2.2, dz));

  // Potted plant (near window, northwest) - with bopping animation
  const plantX = W-0.5, plantZ = -D+0.55;
  addTo(sc, place(box(0.32, 0.44, 0.32, 0xa07040), plantX, 0.22, plantZ)); // pot
  const plantTop = new Group();
  const stem = box(0.05, 0.55, 0.05, 0x306020);
  stem.position.set(0, 0.25, 0);
  plantTop.add(stem);
  const plantLeaf = new Mesh(new SphereGeometry(0.3, 8, 7), mat(0x4a8030));
  plantLeaf.scale.set(1, 1.25, 1);
  plantLeaf.position.set(0, 0.7, 0);
  plantTop.add(plantLeaf);
  plantTop.position.set(plantX, 0.44, plantZ);
  sc.add(plantTop);
  sc.userData.plantTop = plantTop;
  sc.userData.plantBaseRot = 0;

  // Small rug under desk area
  addTo(sc, place(box(2.0, 0.014, 1.5, 0x7a4838), dx, 0.01, dz));

  // ── Lighting ──────────────────────────────────────────────────

  const ambient = new AmbientLight(0xffc870, 1.1);
  ambient.userData.baseIntensity = 1.1;
  sc.add(ambient);

  const sun = new DirectionalLight(0xffb650, 3.2);
  sun.position.set(W+5, 10, 1);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.userData.baseIntensity = 3.2;
  Object.assign(sun.shadow.camera, { left:-9, right:9, top:9, bottom:-9, near:0.5, far:25 });
  sc.add(sun);

  const fill = new PointLight(0xffd890, 1.4, 14, 1);
  fill.position.set(0, 3.2, 0);
  fill.userData.baseIntensity = 1.4;
  sc.add(fill);

  const winLight = new PointLight(0xffe060, 2.8, 6, 1.5);
  winLight.userData.baseIntensity = 2.8;
  winLight.position.set(W-0.5, wY+wH*0.6, 0); sc.add(winLight);

  // Sun shaft
  const shaft = new Mesh(
    new CylinderGeometry(0.15, 3.8, 7, 10, 1, true),
    new MeshBasicMaterial({ color: 0xffe070, transparent: true, opacity: 0.03, side: THREE.BackSide, depthWrite: false })
  );
  shaft.rotation.z = Math.PI/2;
  shaft.position.set(W-3.5, 1.7, 0.3);
  sc.add(shaft);

  // Dust particles
  const N = 380;
  const dPos = new Float32Array(N*3), dVel = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    dPos[i*3]   = (Math.random()-0.5)*(W*2-1.2);
    dPos[i*3+1] = Math.random()*(H-0.2)+0.1;
    dPos[i*3+2] = (Math.random()-0.5)*(D*2-1);
    dVel[i*3]   = (Math.random()-0.5)*0.0008;
    dVel[i*3+1] = (Math.random()-0.5)*0.0004;
    dVel[i*3+2] = (Math.random()-0.5)*0.0006;
  }
  const dustGeo = new BufferGeometry();
  dustGeo.setAttribute('position', new BufferAttribute(dPos, 3));
  const dustPts = new Points(dustGeo, new PointsMaterial({ color: 0xffe0a0, size: 0.023, transparent: true, opacity: 0.62, sizeAttenuation: true }));
  sc.userData.dust = { pts: dustPts, vel: dVel, W, D, H };
  sc.add(dustPts);

  return sc;
}

// ─── Build ──────────────────────────────────────────────────────────
const hubSc  = buildHub();
const bedSc  = buildBedroom();
const charHub = makeCharacter(); charHub.visible = false; hubSc.add(charHub);
const charBed = makeCharacter(); charBed.visible = false; bedSc.add(charBed);

// ─── Transition ─────────────────────────────────────────────────────
const fadeEl  = document.getElementById('fade');
const roomEl  = document.getElementById('room');

function goTo(dest) {
  if (busy) return;
  busy = true;
  fadeEl.style.opacity = '1';
  setTimeout(() => {
    scene = dest;
    if (dest === 'bedroom') {
      char.x = 0; char.z = 2.6; char.ry = Math.PI;
      roomEl.textContent = 'a sunday afternoon';
      initAudioAnalyser();
      bedroomAudio.play();
    } else {
      char.x = 0; char.z = -3.2; char.ry = 0;
      roomEl.textContent = 'the hallway';
      bedroomAudio.pause();
    }
    const off = { y: 7.8, dz: 6.2 };
    camera.position.set(char.x, off.y, char.z + off.dz);
    camera.lookAt(char.x, 0.9, char.z);
    fadeEl.style.opacity = '0';
    setTimeout(() => { busy = false; }, 780);
  }, 760);
}

// ─── Movement ───────────────────────────────────────────────────────
function tick() {
  if (busy) return;
  const spd = 0.075;

  // Forward direction from current facing angle
  const fx = Math.sin(char.ry);
  const fz = Math.cos(char.ry);
  // Right direction (perpendicular to forward)
  const rx = Math.cos(char.ry);
  const rz = -Math.sin(char.ry);

  let mx = 0, mz = 0;
  // Forward/backward
  if (keys['ArrowUp']   || keys['KeyW']) { mx += fx * spd; mz += fz * spd; }
  if (keys['ArrowDown'] || keys['KeyS']) { mx -= fx * spd; mz -= fz * spd; }
  // Strafe left/right
  if (keys['ArrowLeft']  || keys['KeyA']) { mx += rx * spd; mz += rz * spd; }
  if (keys['ArrowRight'] || keys['KeyD']) { mx -= rx * spd; mz -= rz * spd; }

  const nx = char.x + mx;
  const nz = char.z + mz;
  const inDoor = Math.abs(nx) < 1.15;

  if (scene === 'hub') {
    if (nz < -4.65 && inDoor) { goTo('bedroom'); return; }
    char.x = Math.max(-4.72, Math.min(4.72, nx));
    char.z = inDoor ? Math.max(-5.3, Math.min(4.72, nz)) : Math.max(-4.72, Math.min(4.72, nz));
  } else {
    if (nz > 3.62 && inDoor) { goTo('hub'); return; }
    char.x = Math.max(-4.72, Math.min(4.72, nx));
    char.z = inDoor ? Math.min(4.3, Math.max(-3.72, nz)) : Math.max(-3.72, Math.min(3.62, nz));
  }
}

function updateCam() {
  const eyeH = 1.62;
  camera.position.set(char.x, eyeH, char.z);
  // Look direction with pitch (rx) and yaw (ry)
  camera.lookAt(
    char.x + Math.sin(char.ry) * Math.cos(char.rx),
    eyeH + Math.sin(char.rx),
    char.z + Math.cos(char.ry) * Math.cos(char.rx)
  );
}

// ─── Atmosphere ─────────────────────────────────────────────────────
function animateDust() {
  const ud = bedSc.userData.dust;
  const p = ud.pts.geometry.attributes.position.array;
  const v = ud.vel;
  for (let i = 0; i < p.length; i += 3) {
    p[i]   += v[i]   + Math.cos(clock*0.28+i)*0.00022;
    p[i+1] += v[i+1] + Math.sin(clock*0.18+i)*0.00010;
    p[i+2] += v[i+2] + Math.sin(clock*0.22+i*0.5)*0.00018;
    if (p[i]   >  ud.W-0.6) p[i]   = -(ud.W-0.6);
    if (p[i]   < -(ud.W-0.6)) p[i] =   ud.W-0.6;
    if (p[i+1] >  ud.H-0.15) p[i+1] = 0.1;
    if (p[i+1] <  0.1) p[i+1] = ud.H-0.15;
    if (p[i+2] >  ud.D-0.5) p[i+2] = -(ud.D-0.5);
    if (p[i+2] < -(ud.D-0.5)) p[i+2] = ud.D-0.5;
  }
  ud.pts.geometry.attributes.position.needsUpdate = true;
}

function animateLeaves() {
  if (!bedSc.userData.leaves) return;
  const lf = bedSc.userData.leaves;
  const p = lf.pts.geometry.attributes.position.array;
  const v = lf.vel;
  for (let i = 0; i < p.length; i += 3) {
    // Drift with wind and fall
    p[i]   += v[i] + Math.sin(clock * 0.5 + i) * 0.003;
    p[i+1] += v[i+1];
    p[i+2] += v[i+2] + Math.cos(clock * 0.4 + i) * 0.002;
    // Reset when fallen
    if (p[i+1] < -0.5) {
      p[i+1] = 5 + Math.random() * 2;
      p[i]   = (Math.random() - 0.5) * 8;
      p[i+2] = (Math.random() - 0.5) * 5;
    }
  }
  lf.pts.geometry.attributes.position.needsUpdate = true;
}

function flickerHub() {
  hubSc.children.forEach(c => {
    if (c.isPointLight && c.userData.base !== undefined) {
      c.intensity = c.userData.base * (1 + Math.sin(clock*2.1+c.position.x*3)*0.11 + Math.sin(clock*5.3+c.position.z)*0.06);
    }
  });
}

function pulseBedroom() {
  if (scene !== 'bedroom') return;
  const bass = getBassLevel();

  // Pulse walls
  if (bedSc.userData.walls) {
    const wallPulse = 1 + bass * 0.08;
    bedSc.userData.walls.forEach(wall => {
      wall.scale.y = wallPulse;
    });
  }

  // Check if drums have kicked in (based on audio timestamp)
  const audioTime = bedroomAudio.currentTime;
  const isPlaying = !bedroomAudio.paused;
  const drumsPlaying = isPlaying && audioTime >= DRUM_START_TIME;

  // Calculate beat phase (0 to 1) based on BPM, synced to audio time
  const beatHz = BPM / 60;
  const timeSinceDrums = audioTime - DRUM_START_TIME;
  const beat = drumsPlaying ? (timeSinceDrums * beatHz) % 1 : 0;
  // Sharp down, smooth return up (like a human head nod)
  const nod = drumsPlaying ? (beat < 0.15 ? beat / 0.15 : Math.max(0, 1 - (beat - 0.15) / 0.4)) : 0;

  // Bulldog head bop + idle animations (looking around, blinking)
  if (bedSc.userData.dogHead) {
    const head = bedSc.userData.dogHead;
    const baseY = bedSc.userData.dogHeadBaseY;
    const baseZ = bedSc.userData.dogHeadBaseZ;

    // Idle: Look around slowly (Y rotation)
    const lookAround = Math.sin(clock * 0.4) * 0.25;
    head.rotation.y = lookAround;

    // Head bop: Nod down (X rotation) + position
    head.rotation.x = nod * 0.35;
    head.position.y = baseY - nod * 0.05;
    head.position.z = baseZ + nod * 0.08;
  }

  // Bulldog blinking
  if (bedSc.userData.dogEyes) {
    // Blink every ~3 seconds for 0.15 seconds
    const blinkCycle = clock % 3;
    const isBlinking = blinkCycle < 0.15;
    const eyeScale = isBlinking ? 0.1 : 1;
    bedSc.userData.dogEyes.forEach(eye => {
      eye.scale.y = eyeScale;
    });
  }

  // Plant bop (sway side to side on beat)
  if (bedSc.userData.plantTop) {
    const plant = bedSc.userData.plantTop;
    // Sway left-right on beat
    plant.rotation.z = nod * 0.2 * Math.sin(audioTime * 2);
    // Slight forward lean on beat
    plant.rotation.x = nod * 0.15;
  }

  // Trees outside bop (lean toward house on beat)
  if (bedSc.userData.treeTops) {
    bedSc.userData.treeTops.forEach((tree, i) => {
      // Lean toward the house (negative Z rotation = toward window)
      tree.rotation.z = -nod * 0.2;
      // Slight variation per tree
      tree.rotation.x = nod * 0.05 * Math.sin(i * 1.5);
    });
  }

  // Pulse all lights in the bedroom
  bedSc.children.forEach(c => {
    if (c.isLight && c.userData.baseIntensity !== undefined) {
      c.intensity = c.userData.baseIntensity * (1 + bass * 1.5);
    }
  });

  // Pulse fog density (thicker on bass hits)
  if (bedSc.fog && bedSc.userData.baseFogDensity) {
    bedSc.fog.density = bedSc.userData.baseFogDensity * (1 + bass * 0.8);
  }

  // Camera shake on strong bass
  if (bass > 0.3) {
    const shake = (bass - 0.3) * 0.03;
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake * 0.5;
  }

  // Subtle FOV pulse
  camera.fov = 75 + bass * 8;
  camera.updateProjectionMatrix();
}

// ─── Loop ────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  clock += 0.016;
  tick();
  updateCam();
  animateDust();
  animateLeaves();
  flickerHub();
  pulseBedroom();
  renderer.render(scene === 'hub' ? hubSc : bedSc, camera);
}

// ─── Resize ──────────────────────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

loop();
</script>
